<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#cc0000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <circle cx="200" cy="200" r="300" fill="url(#glow1)"/>
  <circle cx="1000" cy="600" r="250" fill="url(#glow2)"/>

  <!-- Abstract tech network -->
  <g opacity="0.4" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none">
    <line x1="200" y1="150" x2="400" y2="300"/>
    <line x1="400" y1="300" x2="600" y2="200"/>
    <line x1="600" y1="200" x2="800" y2="400"/>
    <line x1="800" y1="400" x2="1000" y2="300"/>
    <line x1="300" y1="500" x2="500" y2="600"/>
    <line x1="500" y1="600" x2="700" y2="500"/>
    <line x1="700" y1="500" x2="900" y2="650"/>
  </g>
  <g fill="#cc0000" opacity="0.8">
    <circle cx="200" cy="150" r="4"/>
    <circle cx="400" cy="300" r="6"/>
    <circle cx="600" cy="200" r="4"/>
    <circle cx="800" cy="400" r="6"/>
    <circle cx="1000" cy="300" r="4"/>
    <circle cx="300" cy="500" r="5"/>
    <circle cx="500" cy="600" r="4"/>
    <circle cx="700" cy="500" r="6"/>
    <circle cx="900" cy="650" r="4"/>
  </g>

  <!-- Mobile phone mockup center -->
  <g transform="translate(450, 200)">
    <rect x="0" y="0" width="300" height="400" rx="40" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <rect x="15" y="50" width="270" height="320" rx="8" fill="rgba(20,20,30,0.9)"/>
    <circle cx="150" cy="30" r="6" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.2)"/>
    <rect x="40" y="80" width="220" height="60" rx="10" fill="rgba(204,0,0,0.15)" stroke="rgba(204,0,0,0.4)"/>
    <rect x="50" y="100" width="120" height="8" rx="4" fill="rgba(255,255,255,0.6)"/>
    <rect x="50" y="115" width="80" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>

    <rect x="40" y="160" width="100" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <rect x="160" y="160" width="100" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="65" cy="190" r="12" fill="rgba(204,0,0,0.5)"/>
    <circle cx="185" cy="190" r="12" fill="rgba(0,102,255,0.5)"/>
    <rect x="50" y="215" width="50" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
    <rect x="170" y="215" width="50" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
    <rect x="50" y="225" width="40" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="170" y="225" width="40" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

    <rect x="40" y="260" width="220" height="90" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <rect x="55" y="280" width="80" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
    <rect x="55" y="295" width="190" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="55" y="305" width="160" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
    <rect x="55" y="320" width="80" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Floating app icons -->
  <g transform="translate(150, 400)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <circle cx="40" cy="40" r="20" fill="none" stroke="#cc0000" stroke-width="2.5"/>
    <path d="M 30 40 L 50 40 M 40 30 L 40 50" stroke="#cc0000" stroke-width="2.5"/>
  </g>
  <g transform="translate(950, 150)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <path d="M 25 30 L 55 30 L 55 55 L 25 55 Z" fill="none" stroke="#cc0000" stroke-width="2.5"/>
    <path d="M 30 40 L 50 40 M 40 30 L 40 50" stroke="#cc0000" stroke-width="2"/>
  </g>
  <g transform="translate(1000, 550)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <polyline points="20,40 35,55 60,25" fill="none" stroke="#cc0000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
    <circle cx="40" cy="40" r="15" fill="none" stroke="#cc0000" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="6" fill="#cc0000"/>
  </g>
</svg>