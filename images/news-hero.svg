    <line x1="0" y1="60" x2="120" y2="60" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="80" x2="60" y2="80" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="120" x2="140" y2="120" stroke="#cc0000" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="140" x2="100" y2="140" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="160" x2="120" y2="160" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="180" x2="80" y2="180" stroke="#fff" stroke-width="1" opacity="0.3"/>
