      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="nhglow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nhglow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
